<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Mini-Platforma</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1c1c1e;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 { margin-bottom: 20px; }
        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
        }
        .video-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            background: #2c2c2e;
            padding: 15px;
            border-radius: 10px;
            min-height: 300px;
        }
        video {
            width: 100%;
            height: auto;
            border-radius: 8px;
            background: black;
            transform: scaleX(-1); /* Kamerani oyna kabi ko'rsatish */
        }
        .controls {
            background: #2c2c2e;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        input {
            padding: 10px;
            width: 60%;
            border-radius: 5px;
            border: none;
            margin-right: 10px;
        }
        button {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background-color: #007aff;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        .chat-panel {
            flex: 1;
            background: #2c2c2e;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            height: 450px;
            padding: 15px;
        }
        .chat-window {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #3a3a3c;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
            background: #1c1c1e;
        }
        .chat-input-area { display: flex; gap: 5px; }
        .chat-input-area input { flex: 1; }
    </style>
</head>
<body>

    <h1>Zoom Mini-Platforma (WebRTC)</h1>

    <div class="container">
        <div class="video-panel">
            <div class="controls">
                <div id="my-peer-id" style="margin-bottom: 15px; font-size: 16px;">Xona ID yuklanmoqda...</div>
                <input type="text" id="room-input" placeholder="Sherigingizning Xona ID raqamini kiriting">
                <button id="join-room" onclick="connectToPeer()">Xonaga ulanish</button>
            </div>

            <div class="video-grid" id="video-grid">
                <div>
                    <p style="text-align:center; margin:5px;">Siz (Kamera)</p>
                    <video id="localVideo" autoplay playsinline></video>
                </div>
                <div>
                    <p style="text-align:center; margin:5px;">Suhbatdosh</p>
                    <video id="remoteVideo" autoplay playsinline></video>
                </div>
            </div>
        </div>

        <div class="chat-panel">
            <h3>Jonli Chat</h3>
            <div class="chat-window" id="chat"></div>
            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Xabar yozing...">
                <button onclick="sendMessage()">Yuborish</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
